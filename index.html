<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing</title>
  <link rel="icon" href="favicon.svg?v=20260522-27" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="styles.css?v=20260522-22">
</head>
<body>

  <!-- Login -->
  <div id="login" class="login-wrap">
    <div class="login-card">
      <h1>Billing</h1>
      <p class="muted">Sign in to continue.</p>
      <form id="loginForm">
        <label>
          <span>Password</span>
          <input type="password" id="password" required autocomplete="current-password" autofocus>
        </label>
        <button type="submit" class="btn-primary btn-block">Sign in</button>
        <p id="loginError" class="error hidden"></p>
      </form>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="header">
      <nav class="tabs">
        <button class="tab active" data-tab="dashboard">Dashboard</button>
        <button class="tab" data-tab="clients">Clients</button>
        <button class="tab" data-tab="payments">Payments</button>
        <button class="tab" data-tab="expenses">Expenses</button>
        <button class="tab" data-tab="revenue">Revenue</button>
      </nav>
      <button id="logout" class="btn-ghost">Log out</button>
    </header>

    <main class="main">

      <!-- Dashboard -->
      <section id="tab-dashboard" class="tab-panel active">
        <div id="banner" class="banner hidden"></div>
        <div class="row-between">
          <h2>Today</h2>
          <div class="action-row">
            <button class="btn-ghost" id="dashRecordPaymentBtn">+ Record payment</button>
            <button class="btn-primary" id="dashAddClientBtn">+ Add client</button>
          </div>
        </div>
        <div class="kpi-row" id="kpiRow"></div>
        <div class="two-col">
          <div class="card">
            <div class="card-header card-header-row">
              <h2 id="upcomingTitle">Upcoming</h2>
              <div class="seg-control" id="upcomingWindow">
                <button type="button" data-days="3">3 days</button>
                <button type="button" data-days="7">7 days</button>
                <button type="button" data-days="30" class="active">30 days</button>
              </div>
            </div>
            <div id="upcomingList"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <h2>Overdue</h2>
            </div>
            <div id="overdueList"></div>
          </div>
        </div>
        <div class="card" id="upsellCard" hidden>
          <div class="card-header">
            <h2>Upsell follow-ups due</h2>
          </div>
          <div id="upsellList"></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h2>Recent payments</h2>
          </div>
          <div id="recentPayments"></div>
        </div>
      </section>

      <!-- Clients -->
      <section id="tab-clients" class="tab-panel">
        <div class="row-between">
          <h2>All clients</h2>
          <button class="btn-primary" id="addClientBtn">+ Add client</button>
        </div>
        <div class="kpi-row" id="clientsKpiRow"></div>
        <div class="filter-pills" id="clientFilter">
          <button class="filter-pill active" data-filter="all">All</button>
          <button class="filter-pill" data-filter="recurring">Recurring</button>
          <button class="filter-pill" data-filter="one-off">One off</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin:0 0 14px;">
          <input type="search" id="clientSearch" placeholder="Search clients by name, business or phone…" autocomplete="off"
            style="flex:1;padding:9px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:14px;background:#fff;color:inherit;">
          <span id="clientSearchCount" style="font-size:13px;color:#888;white-space:nowrap;"></span>
        </div>
        <div class="card no-pad" id="clientsList"></div>
      </section>

      <!-- Payments -->
      <section id="tab-payments" class="tab-panel">
        <div class="row-between">
          <h2>Payments</h2>
          <button class="btn-primary" id="addPaymentBtn">+ Record payment</button>
        </div>
        <div class="card no-pad" id="paymentsList"></div>
      </section>

      <!-- Expenses -->
      <section id="tab-expenses" class="tab-panel">
        <div class="row-between">
          <h2>Expenses</h2>
          <div class="action-row">
            <button class="btn-ghost" id="logExpensePaymentBtn">Log payment</button>
            <button class="btn-ghost" id="addExpenseBtn">+ Add recurring</button>
            <button class="btn-primary" id="quickExpenseBtn">+ Record expense</button>
          </div>
        </div>
        <div class="kpi-row" id="expenseKpis"></div>
        <div class="card no-pad" id="expensesList"></div>
        <div class="card">
          <div class="card-header"><h2>Recent expense payments</h2></div>
          <div id="recentExpensePayments"></div>
        </div>
      </section>

      <!-- Revenue -->
      <section id="tab-revenue" class="tab-panel">
        <div class="row-between">
          <h2>Revenue</h2>
          <div class="seg-control" id="revenuePeriod">
            <button data-p="30d" class="active">This month</button>
            <button data-p="lastmo">Last month</button>
            <button data-p="6mo">6 months</button>
            <button data-p="1yr">12 months</button>
            <button data-p="all">All time</button>
          </div>
        </div>
        <div class="kpi-row" id="revenueSummary"></div>
        <div class="card">
          <div class="card-header">
            <h2>Monthly revenue (last 12 months)</h2>
          </div>
          <div id="revenueChart"></div>
        </div>
        <div class="card">
          <div class="card-header">
            <h2 id="topClientsTitle">Top clients</h2>
          </div>
          <div id="topClients"></div>
        </div>
      </section>

    </main>
  </div>

  <div id="modalBackdrop" class="modal-backdrop hidden"></div>
  <div id="modal" class="modal hidden"></div>
  <div id="toast" class="toast hidden"></div>

  <script src="app.js?v=20260526-4"></script>
</body>
</html>
